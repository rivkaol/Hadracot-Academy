<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>בריאות שבאה מהלב | רבקה הולצברג</title>
    
    <!-- הכנת חיבורים לטעינה מהירה יותר (Preconnect) -->
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Icons & Confetti -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        html, body { 
            font-family: 'Rubik', sans-serif; 
            background-color: #F7F9FA; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            width: 100%;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* כרטיסיות טעינה (Skeleton) */
        .skeleton-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // הגדרת פלטת "השלווה האורגנית"
        // ==========================================
        const themeConfig = {
          'personal-growth': {
            main: '#C5A18E', // חול חם
            darkText: '#8E6D5B',
            bgClass: 'bg-[#C5A18E]/15',
            borderClass: 'border-r-4 border-r-[#C5A18E]',
            gradient: 'from-[#C5A18E]/30 to-transparent',
            ctaText: 'אני רוצה שינוי אמיתי'
          },
          'health': {
            main: '#94A388', // ירוק מרווה
            darkText: '#1B4D3E',
            bgClass: 'bg-[#94A388]/15',
            borderClass: 'border-r-4 border-r-[#94A388]',
            gradient: 'from-[#94A388]/30 to-transparent',
            ctaText: 'אני רוצה להרגיש קלילה'
          }
        };

        const LucideIcon = ({ name, className = "", size = 24 }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && spanRef.current) {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: tempDiv });
                    const svg = tempDiv.firstChild;
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        spanRef.current.innerHTML = '';
                        spanRef.current.appendChild(svg);
                    }
                }
            }, [name, className, size]);
            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // ==========================================
        // חיבור לפיירבייס 
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyDwiBnuProvzg5wawVzNpKEW0AmIw5-VY8",
          authDomain: "hadrcot-management.firebaseapp.com",
          projectId: "hadrcot-management",
          storageBucket: "hadrcot-management.firebasestorage.app",
          messagingSenderId: "1070403566876",
          appId: "1:1070403566876:web:2e3c001468931153390ed9",
          measurementId: "G-FSTTVJS6ZV"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // נתוני גיבוי במקרה של שגיאת הרשאות או משיכה מגוגל שיטס
        const fallbackTutorialsData = [
          {
            id: 'personal-growth',
            title: 'תודעה ושינוי מבפנים',
            description: 'כאן תמצאי כלים שיעזרו לך ליצור שינוי אמיתי – מבפנים החוצה.',
            tutorials: [
              { id: 56701, title: 'איך לחזק את כח הרצון מבחינה נוירולוגית?', badge: 'נקודת התחלה חשובה', vimeoId: '1136235641', categoryId: 'personal-growth', pdfUrl: 'https://example.com/dummy.pdf', pdfTitle: 'דף עבודה: חיזוק כוח הרצון' },
              { id: 56702, title: 'המנועים הסודיים של שינוי אמיתי', vimeoId: '1145367897', categoryId: 'personal-growth', isNew: true },
              { id: 56744, title: 'ניהול זמן חכם - תפסיקו לרוץ, ותתחילו לחיות', badge: 'הדרכה מיוחדת', vimeoId: '1154422489', categoryId: 'personal-growth' },
              { id: 56704, title: 'שוזרת חוטים חדשים', vimeoId: '1166120313', vimeoHash: '4f38847d7f', categoryId: 'personal-growth' },
              { id: 56705, title: 'לב שמח - גוף בריא', vimeoId: '1168230791', vimeoHash: 'c88c0f73ee', categoryId: 'personal-growth' },
              { id: 56706, title: 'ניקוי חמץ פנימי - מהגוף אל הנפש', vimeoId: '1177093031', categoryId: 'personal-growth' },
            ]
          },
          {
            id: 'health',
            title: 'גוף בריא ואורח חיים מאוזן',
            description: 'ידע פרקטי לאורח חיים בריא, מזין ומאוזן.',
            tutorials: [
              { id: 56707, title: 'המדריך המלא לממתיקים', vimeoId: '1140919510', categoryId: 'health' },
              { id: 56708, title: 'חורף בריא - חיזוק מערכת החיסון', vimeoId: '1150195614', categoryId: 'health', isNew: true },
              { id: 56709, title: 'עיכול של שינוי - מבהלה לביטחון', badge: 'מומלץ', vimeoId: '1159548569', categoryId: 'health' },
              { id: 56710, title: 'פסח נקי מרעלים', vimeoId: '1172694105', vimeoHash: 'bb32ffd019', categoryId: 'health' },
            ]
          }
        ];

        // ==========================================
        // מסך טעינה - Skeleton Loaders (חוויית פרימיום)
        // ==========================================
        const SkeletonGallery = () => (
          <div dir="rtl" className="min-h-screen font-sans bg-[#F7F9FA] text-[#1B4D3E]">
            <header className="bg-white sticky top-0 z-50 border-b border-gray-100 shadow-sm h-20 flex items-center px-4 sm:px-8">
               <div className="skeleton-shimmer h-10 w-48 rounded-md"></div>
            </header>
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
              <div className="skeleton-shimmer h-48 w-full rounded-[2rem] mb-12"></div>
              <div className="flex gap-4 mb-8">
                <div className="skeleton-shimmer h-8 w-24 rounded-md"></div>
                <div className="skeleton-shimmer h-8 w-32 rounded-md"></div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                {[1, 2, 3, 4, 5, 6].map(i => (
                  <div key={i} className="bg-white rounded-2xl p-4 h-72 border border-gray-100 shadow-sm flex flex-col">
                     <div className="skeleton-shimmer rounded-xl h-36 w-full mb-4"></div>
                     <div className="skeleton-shimmer h-5 rounded w-3/4 mb-2"></div>
                     <div className="skeleton-shimmer h-4 rounded w-1/2"></div>
                     <div className="mt-auto flex justify-end"><div className="skeleton-shimmer h-8 rounded-full w-24"></div></div>
                  </div>
                ))}
              </div>
            </main>
          </div>
        );

        // ==========================================
        // מסך התחברות (Login)
        // ==========================================
        const LoginScreen = ({ onLogin, onCancel, isLoading, error, pendingTutorial, clearError }) => {
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState(''); 

          const handleSubmit = (e) => {
            e.preventDefault();
            if (emailInput.trim() && passwordInput.trim()) {
              onLogin(emailInput.trim(), passwordInput.trim());
            }
          };

          const handleEmailAppend = (domain) => {
            if (emailInput.includes('@')) {
              setEmailInput(emailInput.split('@')[0] + domain);
            } else {
              setEmailInput(emailInput + domain);
            }
            if (error && clearError) clearError();
          };

          const purchaseUrl = pendingTutorial?.landingPageUrl || 
            `https://wa.me/504207702?text=${encodeURIComponent('היי רבקה, אשמח לקבל פרטים ולינק רכישה להדרכה: ' + (pendingTutorial?.title || ''))}`;

          return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-[#F7F9FA] pb-24">
              <div className="w-full max-w-md bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-gray-100 text-center relative overflow-hidden">
                
                <button onClick={onCancel} className="absolute top-6 left-6 text-gray-400 hover:text-[#1B4D3E] transition-colors z-20">
                  <LucideIcon name="chevron-right" size={24} />
                </button>

                <div className="absolute top-0 right-0 w-32 h-32 bg-[#D4AF37]/10 rounded-full blur-3xl -translate-y-10 translate-x-10"></div>
                <div className="absolute bottom-0 left-0 w-32 h-32 bg-[#1B4D3E]/5 rounded-full blur-3xl translate-y-10 -translate-x-10"></div>
                
                <div className="relative z-10 mt-2">
                  <img src="logo.jpg.png" alt="לוגו" className="h-16 w-auto mx-auto mb-4 object-contain" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                  <div className="hidden w-16 h-16 bg-[#1B4D3E] rounded-full items-center justify-center text-[#D4AF37] font-serif font-bold text-3xl mx-auto mb-5 shadow-md">
                    ר
                  </div>
                  
                  <h1 className="text-3xl font-bold text-[#1B4D3E] mb-2">ברוכה הבאה</h1>
                  <p className="text-[#2F4858] mb-6 font-medium leading-[1.8]">התחברי כדי לגשת להדרכות שרכשת</p>

                  <form onSubmit={handleSubmit} className="space-y-5 text-right">
                    <div>
                      <label className="block text-sm font-bold text-[#1B4D3E] mb-2 px-1" htmlFor="email">כתובת מייל</label>
                      <div className="relative">
                        <input 
                          type="email" 
                          id="email"
                          name="email"
                          autoComplete="username"
                          value={emailInput}
                          onChange={(e) => {
                            setEmailInput(e.target.value);
                            if (error && clearError) clearError();
                          }}
                          placeholder="name@example.com"
                          className="w-full p-4 pr-12 bg-[#F7F9FA] border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#D4AF37] transition-all text-[#2F4858]"
                          required
                          disabled={isLoading}
                        />
                        <div className="absolute right-4 top-1/2 -translate-y-1/2">
                          <LucideIcon name="mail" className="text-gray-400" size={20} />
                        </div>
                      </div>
                      
                      <div className="flex gap-2 mt-2 justify-start px-1" dir="ltr">
                        {['@gmail.com', '@yahoo.com'].map(domain => (
                          <button 
                            key={domain} 
                            type="button" 
                            onClick={() => handleEmailAppend(domain)} 
                            className="text-[11px] font-medium bg-gray-100 hover:bg-[#D4AF37]/20 hover:text-[#B8962D] text-gray-500 px-2.5 py-1.5 rounded-lg transition-colors"
                          >
                            {domain}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-[#1B4D3E] mb-2 px-1" htmlFor="password">סיסמה</label>
                      <div className="relative">
                        <input 
                          type="password" 
                          id="password"
                          name="password"
                          autoComplete="current-password"
                          value={passwordInput}
                          onChange={(e) => {
                            setPasswordInput(e.target.value);
                            if (error && clearError) clearError();
                          }}
                          placeholder="••••••••"
                          className="w-full p-4 pr-12 bg-[#F7F9FA] border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#D4AF37] transition-all text-[#2F4858]"
                          required
                          disabled={isLoading}
                        />
                        <div className="absolute right-4 top-1/2 -translate-y-1/2">
                          <LucideIcon name="key-round" className="text-gray-400" size={20} />
                        </div>
                      </div>
                    </div>

                    {error && (
                      <div className="bg-red-50 text-red-600 text-sm font-medium p-3 rounded-xl border border-red-100 text-center mt-2">
                        {error}
                      </div>
                    )}

                    <button 
                      type="submit" 
                      disabled={isLoading || !emailInput.trim() || !passwordInput.trim()}
                      className="w-full bg-[#1B4D3E] hover:bg-[#153D31] disabled:bg-gray-300 disabled:cursor-not-allowed text-white py-4 rounded-2xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2 mt-4"
                    >
                      {isLoading ? (
                        <><LucideIcon name="loader" className="animate-spin text-white" size={20} /> מתחברת...</>
                      ) : (
                        'התחברי למרחב ההדרכות'
                      )}
                    </button>
                  </form>
                  
                  {/* אזור רכישה למשתמשות שלא קנו */}
                  <div className="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p className="text-[#2F4858] text-base mb-3 font-bold">
                      עדיין לא רכשת את ההדרכה?
                    </p>
                    <a 
                      href={purchaseUrl} 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="inline-flex items-center justify-center gap-2 bg-white text-[#B8962D] border border-[#D4AF37]/50 hover:bg-[#D4AF37]/10 font-bold py-2.5 px-6 rounded-xl transition-all shadow-sm w-full"
                    >
                      <LucideIcon name="sparkles" size={16} />
                      לפרטים והרשמה
                    </a>
                  </div>
                  
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // מסך הבית (מרכז ההדרכות - הגלריה)
        // ==========================================
        const TutorialsHub = ({ tutorialsData, onSelectTutorial, accessibleTutorialIds, isAuthenticated, searchQuery, completedTutorials, lastWatchedTutorial, isClubMember }) => {
          const [activeTab, setActiveTab] = useState('all');

          // סינון חכם לפי החיפוש והטאב הפעיל (מוגן בפני שגיאות של מחרוזות)
          const visibleData = useMemo(() => {
            return tutorialsData.map(category => {
              if (activeTab !== 'all' && activeTab !== category.id) return null;
              
              const query = (searchQuery || '').toLowerCase();
              const filteredTutorials = category.tutorials.filter(tutorial => {
                const titleStr = tutorial?.title ? String(tutorial.title).toLowerCase() : '';
                const descStr = tutorial?.description ? String(tutorial.description).toLowerCase() : '';
                return titleStr.includes(query) || descStr.includes(query);
              });

              if (filteredTutorials.length === 0) return null;
              return { ...category, tutorials: filteredTutorials };
            }).filter(Boolean);
          }, [tutorialsData, activeTab, searchQuery]);

          // הגדרת אזור הגירוי העליון (Hero Section)
          let heroTutorial = null;
          let isHeroContinue = false;
          
          if (lastWatchedTutorial && (isClubMember || accessibleTutorialIds.includes(lastWatchedTutorial.id))) {
            heroTutorial = lastWatchedTutorial;
            isHeroContinue = true;
          } else {
            heroTutorial = tutorialsData[0]?.tutorials[0];
          }

          return (
            <div>
              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 pb-28 md:pb-12">
                
                {/* אזור "המשך צפייה" או "התחילי מכאן" */}
                {heroTutorial && !searchQuery && (
                  <section className="mb-12">
                    <div className="bg-white rounded-[2rem] p-6 md:p-8 border border-gray-100 shadow-[0_20px_50px_rgba(148,163,136,0.1)] flex flex-col md:flex-row items-center gap-8 relative overflow-hidden transition-all hover:shadow-[0_20px_50px_rgba(148,163,136,0.15)]">
                      <div className="absolute top-0 right-0 w-32 h-32 bg-[#D4AF37] opacity-5 rounded-full blur-2xl transform translate-x-10 -translate-y-10"></div>
                      
                      <div 
                        onClick={() => onSelectTutorial(heroTutorial)}
                        className="w-full md:w-1/3 aspect-video bg-[#1B4D3E]/5 rounded-2xl relative overflow-hidden flex items-center justify-center shrink-0 group cursor-pointer"
                      >
                        {heroTutorial.imageUrl ? (
                            <img src={heroTutorial.imageUrl} alt={heroTutorial.title} className="absolute inset-0 w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500" />
                        ) : (
                            <div className="absolute inset-0 bg-gradient-to-tr from-[#1B4D3E]/10 to-transparent"></div>
                        )}
                        <div className="w-16 h-16 bg-white/95 rounded-full flex items-center justify-center text-[#1B4D3E] shadow-lg group-hover:scale-105 transition-transform duration-300 z-10">
                            <LucideIcon name="play-circle" size={32} className="text-[#1B4D3E]" />
                        </div>
                      </div>

                      <div className="flex-1 z-10">
                        <div className="inline-flex items-center gap-1.5 text-xs font-bold bg-[#D4AF37]/10 text-[#B8962D] px-3 py-1 rounded-full mb-3">
                          {isHeroContinue ? <LucideIcon name="clock" size={14} /> : <LucideIcon name="sparkles" size={14} />}
                          {isHeroContinue ? 'המשך מאיפה שעצרת' : 'אם את חדשה – התחילי כאן'}
                        </div>
                        <h2 className="text-2xl md:text-3xl font-bold text-[#1B4D3E] mb-3">
                          {heroTutorial.title}
                        </h2>
                        <p className="text-[#2F4858] mb-6 max-w-xl leading-relaxed">
                          {heroTutorial.description || (isHeroContinue ? 'המשיכי את הלמידה וההתפתחות שלך מהנקודה האחרונה.' : 'הדרכה מרתקת שתעשה לך סדר ותיתן לך כלים לשינוי שמחזיק לאורך זמן.')}
                        </p>
                        <button 
                          onClick={() => onSelectTutorial(heroTutorial)}
                          className="bg-[#1B4D3E] hover:bg-[#153D31] text-white px-6 py-2.5 rounded-full font-medium flex items-center gap-2 transition-all shadow-md hover:shadow-lg"
                        >
                          {isHeroContinue ? 'המשך צפייה' : 'אני רוצה להתחיל'}
                          <LucideIcon name="arrow-left" size={18} />
                        </button>
                      </div>
                    </div>
                  </section>
                )}

                {/* טאבים לניווט */}
                <div className="flex overflow-x-auto hide-scrollbar border-b border-gray-200 mb-10 pb-1">
                  <div className="flex gap-6 min-w-max px-2">
                    <button 
                      onClick={() => setActiveTab('all')}
                      className={`pb-3 text-sm md:text-base font-medium transition-all relative
                        ${activeTab === 'all' ? 'text-[#1B4D3E]' : 'text-[#2F4858]/60 hover:text-[#1B4D3E]'}
                      `}
                    >
                      כל ההדרכות
                      {activeTab === 'all' && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-[#1B4D3E] rounded-t-full"></span>}
                    </button>
                    
                    {tutorialsData.map(category => (
                      <button 
                        key={category.id}
                        onClick={() => setActiveTab(category.id)}
                        className={`pb-3 text-sm md:text-base font-medium transition-all relative flex items-center gap-2
                          ${activeTab === category.id ? 'text-[#1B4D3E]' : 'text-[#2F4858]/60 hover:text-[#1B4D3E]'}
                        `}
                      >
                        {category.title}
                        {activeTab === category.id && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-[#1B4D3E] rounded-t-full"></span>}
                      </button>
                    ))}
                  </div>
                </div>

                {/* טיפול ב-Empty State לחיפוש */}
                {visibleData.length === 0 && (
                  <div className="text-center py-16 text-gray-500 animate-in fade-in duration-300">
                     <LucideIcon name="search" size={48} className="mx-auto mb-4 text-gray-300" />
                     <p className="text-lg font-medium text-[#1B4D3E] mb-4">לא מצאנו הדרכות שמתאימות לחיפוש שלך.</p>
                     <a href={`https://wa.me/504207702?text=${encodeURIComponent('היי רבקה, חיפשתי במרחב הדרכה על "' + searchQuery + '" ואשמח אם תוכלי להכין אחת כזו!')}`} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-[#D4AF37] font-bold bg-[#D4AF37]/10 hover:bg-[#D4AF37]/20 px-5 py-2.5 rounded-xl transition-colors shadow-sm">
                        <LucideIcon name="lightbulb" size={18} />
                        לא מצאת? כתבי לי כאן ואולי זו תהיה ההדרכה הבאה
                     </a>
                  </div>
                )}

          useEffect(() => {
             notesRef.current = notes;

            setIsSaved(false);

                    db.collection("users").doc(userEmail).collection("notes").doc(tutorial.id.toString()).set({
                        text: notesRef.current,

        // ==========================================

        // ==========================================
        const App = () => {

          const [accessibleTutorialIds, setAccessibleTutorialIds] = useState([]);
          const [completedTutorials, setCompletedTutorials] = useState([]); 
          const [lastWatchedTutorial, setLastWatchedTutorial] = useState(null); 
          const [isClubMember, setIsClubMember] = useState(false); // סטייט חברת מועדון VIP
          
          const [authLoading, setAuthLoading] = useState(true);
          const [catalogLoading, setCatalogLoading] = useState(true); 
          const [loginError, setLoginError] = useState('');
          const [pendingTutorial, setPendingTutorial] = useState(null); 
          const [searchQuery, setSearchQuery] = useState(''); 
          
          const [tutorialsData, setTutorialsData] = useState([]);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);

          useEffect(() => {
            const handleFocusIn = (e) => {
              if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                setIsKeyboardOpen(true);
              }
            };
            const handleFocusOut = () => {
              setIsKeyboardOpen(false);
            };
            
            window.addEventListener('focusin', handleFocusIn);
            window.addEventListener('focusout', handleFocusOut);
            
            return () => {
              window.removeEventListener('focusin', handleFocusIn);
              window.removeEventListener('focusout', handleFocusOut);
            };
          }, []);

          const fetchCatalog = async () => {
            // 1. נסיון לטעון מזיכרון המטמון (Cache) לטעינה מיידית
            const cachedCatalog = localStorage.getItem('cached_catalog');
            if (cachedCatalog) {
                setTutorialsData(JSON.parse(cachedCatalog));
                setCatalogLoading(false);
            }

            try {
              const response = await fetch("https://script.google.com/macros/s/AKfycbwcU0zaYy02fKkgbG7nuV-nxpy8PghAshJ__eFO6Zt_NNPSqoGn4Zr156jeD5XAobwK/exec", { redirect: "follow" });
              const catalog = await response.json();

              if (!catalog || catalog.length === 0) {
                  if (!cachedCatalog) setTutorialsData(fallbackTutorialsData);
                  setCatalogLoading(false);
                  return;
              }

              const categoriesMap = {
                'personal-growth': {
                  id: 'personal-growth',
                  title: 'תודעה ושינוי מבפנים',
                  description: 'כאן תמצאי כלים שיעזרו לך ליצור שינוי אמיתי – מבפנים החוצה.',
                  icon: <LucideIcon name="sparkles" className="text-[#D4AF37]" size={20} />,
                  tutorials: []
                },
                'health': {
                  id: 'health',
                  title: 'גוף בריא ואורח חיים מאוזן',
                  description: 'ידע פרקטי לאורח חיים בריא, מזין ומאוזן.',
                  icon: <LucideIcon name="heart" className="text-[#D4AF37]" size={20} />,
                  tutorials: []
                }
              };

              catalog.forEach(tutorial => {
                const formattedTutorial = {
                  ...tutorial,
                  id: Number(tutorial.id),
                  title: tutorial.title ? String(tutorial.title) : 'הדרכה ללא שם',
                  imageUrl: tutorial.imageUrl || null,
                  pdfUrl: tutorial.pdfUrl || null,
                  pdfTitle: tutorial.pdfTitle || 'קובץ מצורף',
                  landingPageUrl: tutorial.landingPageUrl || tutorial.landingpageurl || null 
                };

                const catId = formattedTutorial.categoryId || 'personal-growth'; 
                if (categoriesMap[catId]) {
                  categoriesMap[catId].tutorials.push(formattedTutorial);
                } else {
                  categoriesMap[catId] = {
                    id: catId,
                    title: formattedTutorial.categoryTitle || 'הדרכות נוספות',
                    description: '',
                    icon: <LucideIcon name="book-open" className="text-[#D4AF37]" size={20} />,
                    tutorials: [formattedTutorial]
                  };
                }
              });

              const finalData = Object.values(categoriesMap).filter(cat => cat.tutorials.length > 0);
              
              // 2. שמירת הנתונים המעודכנים למטמון
              localStorage.setItem('cached_catalog', JSON.stringify(finalData));
              setTutorialsData(finalData);

            } catch (error) {
              console.log("שגיאה במשיכת הנתונים מהגוגל שיטס. משתמש בזיכרון המטמון או בנתוני הגיבוי...", error);
              if (!cachedCatalog) setTutorialsData(fallbackTutorialsData);
            } finally {
              setCatalogLoading(false);
            }
          };

          useEffect(() => {
            fetchCatalog();

            // 1. טעינה אופטימית של פרטי המשתמש מהמטמון
            const cachedUser = localStorage.getItem('cached_user_data');
            if (cachedUser) {
                try {
                    const data = JSON.parse(cachedUser);
                    setUserEmail(data.email);
                    setUserName(data.name);
                    setAccessibleTutorialIds(data.ids);
                    setCompletedTutorials(data.completed);
                    setIsClubMember(data.isClubMember || false);
                    setIsAuthenticated(true);
                    setAuthLoading(false); // מבטל טעינה מיידית
                } catch (e) {
                    console.error("שגיאה בקריאת מטמון משתמש", e);
                }
            }

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
              .catch((error) => {
                console.error("שגיאה בהגדרת זיכרון התחברות:", error);
              });

            const unsubscribe = auth.onAuthStateChanged(async (user) => {
              if (user && user.email) {
                const normalizedEmail = user.email.toLowerCase().trim();
                setUserEmail(normalizedEmail);
                setIsAuthenticated(true);
                
                try {
                  const docRef = db.collection("users").doc(normalizedEmail);
                  const docSnap = await docRef.get();
                  
                  if (docSnap.exists) {
                    const data = docSnap.data();
                    const purchasedStr = data.purchased_products || "";
                    const ids = purchasedStr.split(',')
                                  .map(id => Number(id.trim()))
                                  .filter(id => !isNaN(id));
                    
                    const completed = data.completed_tutorials || [];
                    const name = data.firstName || data.name || normalizedEmail.split('@')[0];
                    const isClub = data.isClubMember === true; // בודק סטטוס חברת מועדון

                    setAccessibleTutorialIds(ids);
                    setCompletedTutorials(completed);
                    setUserName(name);
                    setIsClubMember(isClub);

                    // שמירה למטמון לפעם הבאה כולל סטטוס מועדון
                    localStorage.setItem('cached_user_data', JSON.stringify({
                        email: normalizedEmail,
                        name: name,
                        ids: ids,
                        completed: completed,
                        isClubMember: isClub
                    }));

                    if (data.last_watched) {
                       setLastWatchedTutorial(data.last_watched);
                    }

                    setPendingTutorial(currentPending => {
                      if (currentPending) {
                        // אם יש לה הרשאה או שהיא חברת מועדון - נכנסת!
                        if (ids.includes(currentPending.id) || isClub) {
                          setTimeout(() => proceedToTutorial(currentPending), 0);
                        } else {
                          const url = currentPending.landingPageUrl || `https://wa.me/504207702?text=${encodeURIComponent('היי רבקה, אשמח לקבל פרטים ולינק רכישה להדרכה: ' + currentPending.title)}`;
                          window.open(url, '_blank');
                          setView('home');
                        }
                      }
                      return null; 
                    });

                  } else {
                    setUserName(normalizedEmail.split('@')[0]);
                  }
                } catch (err) {
                  console.error("שגיאה בסנכרון נתונים:", err);
                }
              } else {
                setIsAuthenticated(false);
                setUserEmail('');
                setUserName('');
                setIsClubMember(false);
                setAccessibleTutorialIds([]);
                setCompletedTutorials([]);
                setLastWatchedTutorial(null);
                localStorage.removeItem('cached_user_data'); // ניקוי מטמון בהתנתקות
              }
              setAuthLoading(false);
            });

            return () => unsubscribe();
          }, []);

          useEffect(() => {
              if (isAuthenticated && tutorialsData.length > 0 && lastWatchedTutorial && typeof lastWatchedTutorial === 'number') {
                  let found = null;
                  tutorialsData.forEach(cat => {
                      const t = cat.tutorials.find(tut => tut.id === lastWatchedTutorial);
                      if (t) found = t;
                  });
                  if (found) setLastWatchedTutorial(found);
              }
          }, [tutorialsData, isAuthenticated]);

          const handleLoginSubmit = async (email, password) => {
            setAuthLoading(true);
            setLoginError('');
            const normalizedEmail = email.toLowerCase().trim();

            try {
              await auth.signInWithEmailAndPassword(normalizedEmail, password);
              if (!pendingTutorial) {
                 setView('home');
              }
            } catch (error) {
              console.log("התחברות נכשלה:", error.code); 
              if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                setLoginError("המייל או הסיסמה אינם נכונים. (או שהמשתמש עדיין לא נוצר במערכת)");
              } else if (error.code === 'auth/user-not-found') {
                setLoginError("לא נמצא משתמש עם המייל הזה.");
              } else {
                setLoginError("חלה שגיאה בהתחברות. ודאי שיש חיבור לאינטרנט ונסי שוב.");
              }
              setAuthLoading(false);
            }
          };

          const handleLogout = async () => {
            await auth.signOut();
            setView('home');
          };

          const handleSelectTutorial = (tutorial) => {
            if (!isAuthenticated) {
              setPendingTutorial(tutorial);
              setView('login');
              return;
            }

            // היא נחסמת רק אם היא לא חברת מועדון וגם לא רכשה ספציפית
            if (!isClubMember && !accessibleTutorialIds.includes(tutorial.id)) {
              const url = tutorial.landingPageUrl || `https://wa.me/504207702?text=${encodeURIComponent('היי רבקה, אשמח לקבל פרטים ולינק רכישה להדרכה: ' + tutorial.title)}`;
              window.open(url, '_blank');
              return;
            }

            if (userEmail && db) {
               db.collection("users").doc(userEmail).set({ last_watched: tutorial.id }, { merge: true }).catch(e => console.log(e));
            }
            setLastWatchedTutorial(tutorial);
            proceedToTutorial(tutorial);
          };

          const proceedToTutorial = (tutorial) => {
            const category = tutorialsData.find(cat => cat.tutorials.some(t => t.id === tutorial.id));
            setSelectedTutorial(tutorial);
            setSelectedCategoryName(category ? category.title : '');
            
            if (category) {
              const currentIndex = category.tutorials.findIndex(t => t.id === tutorial.id);
              if (currentIndex !== -1 && currentIndex < category.tutorials.length - 1) {
                setNextTutorial(category.tutorials[currentIndex + 1]);
              } else {
                setNextTutorial(null);
              }
            }
            setView('tutorial');
            window.scrollTo(0, 0);
          };

          const handleNextTutorial = () => {
            if (nextTutorial) {
              handleSelectTutorial(nextTutorial);
            }
          };

          const handleBackToHome = () => {
            setView('home');
            setSelectedTutorial(null);
            setPendingTutorial(null);
            window.scrollTo(0, 0);
          };

          if ((authLoading || catalogLoading) && view !== 'login') {
            return <SkeletonGallery />;
          }

          if (view === 'login') {
            return <LoginScreen 
                     onLogin={handleLoginSubmit} 
                     onCancel={handleBackToHome}
                     isLoading={authLoading} 
                     error={loginError}
                     pendingTutorial={pendingTutorial}
                     clearError={() => setLoginError('')}
                   />;
          }

          return (
            <div dir="rtl" className="min-h-screen font-sans bg-[#F7F9FA] text-[#1B4D3E]">
              
              <header className="bg-white sticky top-0 z-50 border-b border-gray-100 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
                  
                  <div className="w-1/3 flex items-center">
                    {view === 'tutorial' ? (
                      <button onClick={handleBackToHome} className="hidden lg:flex items-center gap-1.5 md:gap-2 text-[#1B4D3E] font-bold bg-[#E8F0ED] hover:bg-[#1B4D3E] hover:text-[#D4AF37] px-3 md:px-5 py-2 rounded-full transition-all duration-300 shadow-sm border border-[#1B4D3E]/10">
                        <LucideIcon name="chevron-right" size={24} />
                        <span className="hidden md:inline text-base">חזרה לכל ההדרכות</span>
                      </button>
                    ) : isAuthenticated ? (
                      <button onClick={handleLogout} className="text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1 text-sm font-medium" title="התנתקות">
                        <LucideIcon name="log-out" size={18} />
                        <span className="hidden sm:inline">יציאה</span>
                      </button>
                    ) : null}
                  </div>
                  
                  <div className="w-1/3 flex justify-center">
                    <div className="cursor-pointer flex flex-col items-center" onClick={handleBackToHome}>
                      <img src="logo.jpg.png" alt="לוגו המרחב של רבקה" className="h-8 md:h-10 w-auto mb-1 object-contain" onError={(e) => { e.target.onerror = null; e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                      <div className="hidden">
                        <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#1B4D3E] whitespace-nowrap">
                          בריאות שבאה מהלב
                        </h1>
                      </div>
                      <p className="text-xs text-[#D4AF37] font-medium hidden md:block mt-0.5">
                        המרחב שלך לצמיחה, רוגע ובריאות אמיתית
                      </p>
                    </div>
                  </div>

                  <div className="w-1/3 flex justify-end items-center gap-3">
                    <div className="text-left mr-3 hidden md:block">
                      {isAuthenticated ? (
                        <div className="flex flex-col items-end">
                          <div className="flex items-center gap-2">
                            <p className="text-sm font-bold text-[#1B4D3E] truncate max-w-[120px]" title={userName}>
                              שלום {userName}
                            </p>
                            {isClubMember && (
                              <span className="bg-[#D4AF37]/10 text-[#B8962D] text-[10px] font-bold px-2 py-0.5 rounded-full border border-[#D4AF37]/20">
                                VIP
                              </span>
                            )}
                          </div>
                          <a href="https://wa.me/504207702?text=היי רבקה, יש לי רעיון להדרכה חדשה:" target="_blank" rel="noopener noreferrer" className="text-[11px] text-[#D4AF37] font-bold hover:underline flex items-center gap-1 mt-0.5">
                             <LucideIcon name="lightbulb" size={10} /> יש לי רעיון להדרכה
                          </a>
                        </div>
                      ) : (
                        <button onClick={() => setView('login')} className="text-sm font-bold text-[#D4AF37] hover:underline mt-2">
                          התחברי למרחב
                        </button>
                      )}
                    </div>
                    <div className="h-10 w-10 rounded-full bg-[#E8F0ED] flex items-center justify-center text-[#1B4D3E] cursor-pointer hover:bg-[#1B4D3E] hover:text-[#D4AF37] transition-colors hidden md:flex">
                      {isAuthenticated ? <LucideIcon name="book-open" size={18} /> : <LucideIcon name="user" size={18} />}
                    </div>
                  </div>
                </div>
              </header>

              {view === 'home' && (
                <>
                  <div className="bg-white/80 backdrop-blur-md border-b border-gray-100 py-3 sticky top-20 z-40 shadow-sm">
                    <div className="max-w-xl mx-auto px-4 sm:px-6">
                      <div className="flex items-center bg-[#F7F9FA] rounded-full px-4 py-2.5 border border-gray-200 focus-within:border-[#D4AF37] focus-within:bg-white focus-within:shadow-md transition-all">
                        <LucideIcon name="search" size={18} className="text-gray-400" />
                        <input 
                          type="text" 
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          placeholder="חפשי הדרכה או נושא שמעניין אותך..." 
                          className="bg-transparent border-none outline-none mr-3 w-full text-sm text-[#1B4D3E] placeholder-gray-400"
                        />
                        {searchQuery && (
                          <button onClick={() => setSearchQuery('')} className="text-gray-400 hover:text-gray-600">
                             <LucideIcon name="x-circle" size={16} />
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  <TutorialsHub 
                    tutorialsData={tutorialsData}
                    onSelectTutorial={handleSelectTutorial} 
                    accessibleTutorialIds={accessibleTutorialIds}
                    isAuthenticated={isAuthenticated}
                    searchQuery={searchQuery}
                    completedTutorials={completedTutorials}
                    lastWatchedTutorial={lastWatchedTutorial}
                    isClubMember={isClubMember}
                  />
                </>
              )}
              
              {view === 'tutorial' && selectedTutorial && (
                <TutorialPage 
                  tutorial={selectedTutorial} 
                  tutorialsData={tutorialsData}
                  categoryName={selectedCategoryName}
                  onBack={handleBackToHome}
                  onNext={handleNextTutorial}
                  hasNext={!!nextTutorial}
                  accessibleTutorialIds={accessibleTutorialIds}
                  userEmail={userEmail}
                  db={db}
                  completedTutorials={completedTutorials}
                  setCompletedTutorials={setCompletedTutorials}
                  isClubMember={isClubMember}
                />
              )}

              <nav className={`md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-200 justify-around items-center h-[72px] z-50 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)] ${isKeyboardOpen ? 'hidden' : 'flex'}`}>
                <button onClick={handleBackToHome} className={`flex flex-col items-center justify-center w-full h-full ${view === 'home' ? 'text-[#1B4D3E]' : 'text-gray-400 hover:text-[#1B4D3E]'}`}>
                  <LucideIcon name="library" size={22} />
                  <span className="text-[11px] mt-1.5 font-medium">ספרייה</span>
                </button>
                <button onClick={() => {window.scrollTo(0,0); handleBackToHome(); setTimeout(() => document.querySelector('input[type="text"]')?.focus(), 100);}} className="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-[#1B4D3E]">
                  <LucideIcon name="search" size={22} />
                  <span className="text-[11px] mt-1.5 font-medium">חיפוש</span>
                </button>
                <button onClick={() => !isAuthenticated ? setView('login') : null} className={`flex flex-col items-center justify-center w-full h-full ${view === 'login' || (isAuthenticated && view !== 'home') ? 'text-[#1B4D3E]' : 'text-gray-400 hover:text-[#1B4D3E]'}`}>
                  <LucideIcon name="user" size={22} />
                  <span className="text-[11px] mt-1.5 font-medium">האזור שלי</span>
                </button>
              </nav>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
